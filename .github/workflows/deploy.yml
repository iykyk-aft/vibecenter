name: Deploy broker

# Redeploy the broker to the VPS whenever main moves. Manual runs allowed too.
on:
  push:
    branches: [main]
    # Skip deploys for doc/asset-only changes that don't affect the running service.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'vibecenter/**'
  workflow_dispatch:

# Never let two deploys race; cancel an in-flight one if a newer push lands.
concurrency:
  group: deploy-broker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH in and run deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/vibecenter' }}
            APP_DIR="$PWD" bash deploy/deploy.sh
