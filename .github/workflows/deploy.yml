name: Deploy broker

# Redeploy the broker to the VPS whenever main moves. Manual runs allowed too.
on:
  push:
    branches: [main]
    # Skip deploys for doc/asset-only changes that don't affect the running service.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'vibecenter/**'
  workflow_dispatch:

# Never let two deploys race; cancel an in-flight one if a newer push lands.
concurrency:
  group: deploy-broker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Until a VPS is wired up (DEPLOY_HOST secret set), skip cleanly instead of
      # failing every push with a red X. Add the DEPLOY_* secrets to turn it on.
      - name: Check deploy is configured
        id: cfg
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -n "$DEPLOY_HOST" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Broker deploy skipped::DEPLOY_HOST secret not set — add DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY in repo Settings → Secrets to enable auto-deploy."
          fi

      - name: SSH in and run deploy script
        if: steps.cfg.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/vibecenter' }}
            APP_DIR="$PWD" bash deploy/deploy.sh
