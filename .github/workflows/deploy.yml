name: Deploy broker

# Redeploy the broker to the VPS whenever main moves. Manual runs allowed too.
# The runner has private-repo read access, so it rsyncs the code to the box —
# the VPS itself needs no GitHub credentials.
on:
  push:
    branches: [main]
    # Skip deploys for doc/asset-only changes that don't affect the running service.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'vibecenter/**'
  workflow_dispatch:

# Never let two deploys race; cancel an in-flight one if a newer push lands.
concurrency:
  group: deploy-broker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Until a VPS is wired up (DEPLOY_HOST secret set), skip cleanly instead of
      # failing every push with a red X. Add the DEPLOY_* secrets to turn it on.
      - name: Check deploy is configured
        id: cfg
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -n "$DEPLOY_HOST" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Broker deploy skipped::DEPLOY_HOST secret not set — add DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY in repo Settings → Secrets to enable auto-deploy."
          fi

      - name: Checkout
        if: steps.cfg.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Rsync to VPS and restart broker
        if: steps.cfg.outputs.configured == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          REMOTE="${DEPLOY_PATH:-/opt/vibecenter}"
          printf '%s\n' "$DEPLOY_SSH_KEY" > deploy_key
          chmod 600 deploy_key
          SSH="ssh -i deploy_key -o StrictHostKeyChecking=accept-new -p $PORT"
          # Ship the code, but never clobber the broker's live accounts/pairings
          # (broker/data) or node_modules / .git.
          rsync -az --delete \
            --exclude '.git' --exclude 'node_modules' --exclude 'broker/data' --exclude 'data' \
            -e "$SSH" ./ "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE/"
          # Install prod deps if changed + restart the service.
          $SSH "$DEPLOY_USER@$DEPLOY_HOST" "cd '$REMOTE' && APP_DIR=\"\$PWD\" bash deploy/deploy.sh"
          rm -f deploy_key
