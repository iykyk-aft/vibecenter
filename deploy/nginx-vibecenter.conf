# nginx reverse proxy + TLS for the Vibe Center broker.
#
# Setup:
#   1. Point your domain's A/AAAA record at this VPS.
#   2. Edit broker.example.com below to your domain.
#   3. sudo cp deploy/nginx-vibecenter.conf /etc/nginx/sites-available/vibecenter
#      sudo ln -s /etc/nginx/sites-available/vibecenter /etc/nginx/sites-enabled/
#   4. sudo apt install -y certbot python3-certbot-nginx
#      sudo certbot --nginx -d broker.example.com
#         ^ provisions the Let's Encrypt cert, adds the listen 443 + ssl_* lines,
#           and sets up an http->https redirect automatically. Renewal is a cron.
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# Open ports 80 + 443:  sudo ufw allow 'Nginx Full'

server {
    listen 80;
    listen [::]:80;
    server_name broker.example.com;

    # Allow large prompt payloads through.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:7900;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming: the broker keeps long-lived outbound agent channels open
        # and streams Claude output token-by-token. Turn off buffering/caching and
        # use long timeouts so neither the channel nor the stream gets cut off.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
